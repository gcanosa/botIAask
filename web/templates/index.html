<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>botIAask Dashboard</title>
    <!-- Tailwind CSS v4 Play CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-bg: #0f172a;
            --color-card: #1e293b;
            --color-primary: #38bdf8;
            --color-accent: #c084fc;
        }
        body {
            font-family: 'Inter', sans-serif;
            @apply bg-bg text-slate-100 antialiased;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center">
    <div class="container max-w-5xl">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-accent">
                botIAask Dash
            </h1>
            <div class="flex items-center gap-4">
                <button id="news-toggle" onclick="toggleNews()" class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border transition-all cursor-pointer flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full" id="news-indicator"></span>
                    News Fetcher: <span id="news-status-text">OFF</span>
                </button>
                <button id="stats-toggle" onclick="toggleStats()" class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border transition-all cursor-pointer flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full" id="stats-indicator"></span>
                    Stats: <span id="stats-status-text">OFF</span>
                </button>
                <div id="status-badge" class="px-3 py-1 bg-primary/10 text-primary border border-primary/20 rounded-full text-xs font-bold uppercase tracking-wider">
                    Connecting...
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-card p-5 rounded-xl border border-white/5 shadow-lg">
                <h2 class="text-slate-400 text-xs uppercase tracking-widest mb-2 font-semibold">Uptime</h2>
                <div id="uptime" class="mono text-lg font-bold">--</div>
            </div>
            <div class="bg-card p-5 rounded-xl border border-white/5 shadow-lg">
                <h2 class="text-slate-400 text-xs uppercase tracking-widest mb-2 font-semibold">IRC Server</h2>
                <div id="server" class="mono text-lg font-bold truncate">--</div>
            </div>
            <div class="bg-card p-5 rounded-xl border border-white/5 shadow-lg">
                <h2 class="text-slate-400 text-xs uppercase tracking-widest mb-2 font-semibold">AI Requests</h2>
                <div id="ai_requests" class="mono text-lg font-bold">--</div>
            </div>
            <div class="bg-card p-5 rounded-xl border border-white/5 shadow-lg">
                <h2 class="text-slate-400 text-xs uppercase tracking-widest mb-2 font-semibold">AI Model</h2>
                <div id="ai_model" class="mono text-lg font-bold truncate">--</div>
            </div>
        </div>

        <!-- Channels & Interaction -->
        <div class="bg-card rounded-xl border border-white/5 shadow-lg p-6 mb-8">
            <h2 class="text-slate-400 text-xs uppercase tracking-widest mb-4 font-semibold">Active Channels (Click to view logs)</h2>
            <div id="channels" class="flex flex-wrap gap-2">
                <!-- Channels will be injected here -->
            </div>
        </div>

        <!-- Real-time Statistics -->
        <div id="stats-container" class="bg-card rounded-xl border border-white/5 shadow-lg p-6 mb-8 hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-slate-400 text-xs uppercase tracking-widest font-semibold mb-3">Activity Analytics</h2>
                    <div class="flex flex-wrap gap-2" id="timeframe-selector">
                        <button onclick="changeTimeframe('1h')" data-time="1h" class="px-3 py-1 text-[10px] font-bold rounded-md border border-white/5 bg-slate-800 text-slate-400 hover:text-white transition-all cursor-pointer timeframe-btn active">1H</button>
                        <button onclick="changeTimeframe('6h')" data-time="6h" class="px-3 py-1 text-[10px] font-bold rounded-md border border-white/5 bg-slate-800 text-slate-400 hover:text-white transition-all cursor-pointer timeframe-btn">6H</button>
                        <button onclick="changeTimeframe('1d')" data-time="1d" class="px-3 py-1 text-[10px] font-bold rounded-md border border-white/5 bg-slate-800 text-slate-400 hover:text-white transition-all cursor-pointer timeframe-btn">1D</button>
                        <button onclick="changeTimeframe('5d')" data-time="5d" class="px-3 py-1 text-[10px] font-bold rounded-md border border-white/5 bg-slate-800 text-slate-400 hover:text-white transition-all cursor-pointer timeframe-btn">5D</button>
                        <button onclick="changeTimeframe('1m')" data-time="1m" class="px-3 py-1 text-[10px] font-bold rounded-md border border-white/5 bg-slate-800 text-slate-400 hover:text-white transition-all cursor-pointer timeframe-btn">1M</button>
                    </div>
                </div>
                <div class="flex gap-4 text-[10px] mono text-slate-500">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-primary"></span> Messages</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-accent"></span> AI Requests</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> Users</span>
                </div>
            </div>
            <div class="h-[250px] w-full">
                <canvas id="activityChart"></canvas>
            </div>
        </div>

        <!-- Log Viewer Context -->
        <div id="log-container" class="hidden animate-in fade-in slide-in-from-top-4 duration-500">
            <div class="bg-card rounded-xl border border-white/5 shadow-lg overflow-hidden flex flex-col h-[600px]">
                <div class="bg-slate-800/50 px-4 py-2 border-b border-white/5 flex flex-col gap-2 transition-all">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <h3 id="current-channel-title" class="mono font-bold text-primary">Log Viewer</h3>
                        </div>
                        <button onclick="closeAllLogs()" class="text-slate-500 hover:text-white text-xs transition-colors cursor-pointer uppercase tracking-widest font-bold">Close All</button>
                    </div>
                    
                    <!-- Tabs Bar -->
                    <div id="log-tabs" class="flex flex-wrap gap-1 mt-1">
                        <!-- Tabs will be injected here -->
                    </div>
                </div>
                
                <!-- Wrapper for multiple log outputs -->
                <div id="log-outputs-wrapper" class="flex-1 relative overflow-hidden bg-slate-950/30">
                    <!-- Individual log output divs will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
